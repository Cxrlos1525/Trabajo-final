<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Salud — Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,Arial,sans-serif;min-height:100vh;display:flex;
         background:linear-gradient(135deg,#1a3a5c 0%,#2563a8 60%,#0ea5e9 100%);}
    .login-wrap{margin:auto;width:100%;max-width:400px;padding:24px;}
    .card{background:#fff;border-radius:10px;padding:38px 34px;box-shadow:0 20px 60px rgba(0,0,0,.22);}
    .logo{text-align:center;margin-bottom:30px;}
    .logo-circle{width:60px;height:60px;background:#1a3a5c;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;}
    .logo-circle i{color:#fff;font-size:26px;}
    .logo h1{color:#1a3a5c;font-size:22px;font-weight:800;letter-spacing:-.3px;}
    .logo p{color:#64748b;font-size:13px;margin-top:4px;}
    .field{margin-bottom:16px;}
    .field label{font-size:12px;font-weight:600;color:#64748b;display:block;margin-bottom:5px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;}
    .input-wrap input{width:100%;padding:10px 12px 10px 34px;border:1px solid #e2e8f0;border-radius:6px;font-size:14px;outline:none;transition:border .2s,box-shadow .2s;color:#1e293b;}
    .input-wrap input:focus{border-color:#2563a8;box-shadow:0 0 0 3px rgba(37,99,168,.12);}
    .btn{width:100%;padding:11px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn:hover{background:#2563a8;}
    .btn:disabled{background:#94a3b8;cursor:not-allowed;}
    .error-msg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none;border-left:3px solid #dc2626;}
    .hint-box{background:#f1f5f9;border-radius:6px;padding:12px 14px;margin-top:18px;font-size:11px;color:#64748b;}
    .hint-box strong{display:block;margin-bottom:4px;color:#475569;}
    .hint-box code{background:#e2e8f0;padding:1px 5px;border-radius:3px;font-family:monospace;}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-circle"><i class="fa-solid fa-pills"></i></div>
      <h1>Nova Salud</h1>
      <p>Sistema de Gestión de Botica</p>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="usuario@novasalud.pe" value="admin@novasalud.pe">
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••" value="123456">
      </div>
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
    </button>
    <div class="hint-box">
      <strong>Credenciales de prueba</strong>
      Admin: <code>admin@novasalud.pe</code> / <code>123456</code><br>
      Cajero: <code>caja1@novasalud.pe</code> / <code>123456</code>
    </div>
  </div>
</div>
<script>
  if (localStorage.getItem('ns_token')) window.location.href = '/index.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn   = document.getElementById('btnLogin');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const err   = document.getElementById('errMsg');
    if (!email || !pass) { showErr('Complete todos los campos'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';
    err.style.display = 'none';

    try {
      const res  = await fetch('http://localhost:3000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Error');
      localStorage.setItem('ns_token', data.token);
      localStorage.setItem('ns_user',  JSON.stringify(data.user));
      window.location.href = '/index.html';
    } catch (e) {
      showErr(e.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión';
    }
  }

  function showErr(msg) {
    const err = document.getElementById('errMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
