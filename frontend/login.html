<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaludPlus — Acceso</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
   :root {
  --primary:   #111827;
  --primary-l: #1f2937;
  --accent:    #14b8a6;

  --success:   #10b981;
  --warning:   #fbbf24;
  --danger:    #f43f5e;

  --info:      #6366f1;

  --gray-1:    #f9fafb;
  --gray-2:    #e5e7eb;
  --gray-3:    #9ca3af;

  --dark:      #0b1220;
  --white:     #ffffff;

  --shadow:    0 2px 10px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.10);

  --radius:    12px;
}

/* ===== BASE ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, var(--dark), var(--primary));
}

/* ===== WRAP ===== */
.login-wrap {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

/* ===== CARD ===== */
.card {
  background: var(--white);
  border-radius: var(--radius);

  padding: 34px 28px;

  box-shadow: var(--shadow-md);
}

/* ===== LOGO ===== */
.logo {
  text-align: center;
  margin-bottom: 22px;
}

.logo-circle {
  width: 56px;
  height: 56px;

  background: var(--primary);
  border-radius: 12px;

  display: flex;
  align-items: center;
  justify-content: center;

  margin: 0 auto 10px auto;
}

.logo-circle i {
  color: var(--white);
  font-size: 22px;
}

.logo h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
}

.logo p {
  font-size: 12px;
  color: var(--gray-3);
  margin-top: 4px;
}

/* ===== FIELD ===== */
.field {
  margin-bottom: 14px;
}

.field label {
  font-size: 12px;
  font-weight: 600;
  color: var(--primary-l);
  display: block;
  margin-bottom: 6px;
}

/* ===== INPUT ===== */
.input-wrap {
  position: relative;
}

.input-wrap i {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);

  color: var(--gray-3);
  font-size: 14px;
}

.input-wrap input {
  width: 100%;
  padding: 10px 10px 10px 34px;

  border: 1px solid var(--gray-2);
  border-radius: 10px;

  font-size: 14px;
  color: var(--primary);

  outline: none;

  transition: 0.2s ease;
}

.input-wrap input:focus {
  border-color: var(--accent);
}

/* ===== BUTTON ===== */
.btn {
  width: 100%;
  padding: 11px;

  background: var(--primary);
  color: var(--white);

  border: none;
  border-radius: 10px;

  font-size: 14px;
  font-weight: 600;

  cursor: pointer;

  transition: 0.2s ease;
}

.btn:hover {
  background: var(--primary-l);
}

/* ===== ERROR ===== */
.error-msg {
  background: #fee2e2;
  color: var(--danger);

  padding: 10px;
  border-radius: 10px;

  font-size: 13px;

  margin-bottom: 12px;

  border-left: 3px solid var(--danger);
}

/* ===== HINT ===== */
.hint-box {
  background: var(--gray-1);
  border: 1px solid var(--gray-2);

  border-radius: 10px;
  padding: 12px;

  margin-top: 16px;

  font-size: 11px;
  color: var(--gray-3);
}

.hint-box strong {
  display: block;
  margin-bottom: 4px;
  color: var(--primary);
}

.hint-box code {
  background: var(--gray-2);
  padding: 2px 6px;
  border-radius: 6px;
  font-family: monospace;
}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-circle">
        <i class="fa-solid fa-prescription-bottle-medical"></i>
      </div>

      <h1>SaludPlus</h1>
      <p>Sistema de Gestión</p>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <div class="field">
      <label>Correo electrónico</label>
      <div class="input-wrap">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" placeholder="usuario@novasalud.pe" value="admin@novasalud.pe">
      </div>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" placeholder="••••••••" value="123456">
      </div>
    </div>
    <button class="btn" id="btnLogin" onclick="doLogin()">
      <i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión
    </button>
    <div class="hint-box">
      <strong>Credenciales de prueba</strong>
      Admin: <code>admin@novasalud.pe</code> / <code>123456</code><br>
      Cajero: <code>caja1@novasalud.pe</code> / <code>123456</code>
    </div>
  </div>
</div>
<script>
  if (localStorage.getItem('ns_token')) window.location.href = '/index.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const btn   = document.getElementById('btnLogin');
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const err   = document.getElementById('errMsg');
    if (!email || !pass) { showErr('Complete todos los campos'); return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Ingresando...';
    err.style.display = 'none';

    try {
      const res  = await fetch('http://localhost:3000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Error');
      localStorage.setItem('ns_token', data.token);
      localStorage.setItem('ns_user',  JSON.stringify(data.user));
      window.location.href = '/index.html';
    } catch (e) {
      showErr(e.message);
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión';
    }
  }

  function showErr(msg) {
    const err = document.getElementById('errMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>
</body>
</html>
